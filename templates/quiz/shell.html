<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ atividade.titulo }}</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>

<nav class="topbar">
  <span class="topbar-logo">LeDuk</span>
  {% if aluno_nome %}
    <span class="topbar-aluno">{{ aluno_nome }}</span>
  {% endif %}
  {% if tempo_restante_seg > 0 %}
    <span class="timer" id="timer" data-seg="{{ tempo_restante_seg }}" data-ativ="{{ atividade.id }}"></span>
  {% endif %}
</nav>

<div class="shell">

  <header class="ativ-header">
    <h1>{{ atividade.titulo }}</h1>
    {% if total > 0 %}
    <div class="progresso">
      <div class="progresso-barra">
        <div class="progresso-fill" id="prog-fill" style="width: 0%"></div>
      </div>
      <span class="progresso-label" id="prog-label">0 / {{ total }}</span>
    </div>
    {% endif %}
  </header>

  <div id="questao-area"
       hx-indicator="#loading"
       {% if primeira_questao %}
       hx-get="/htmx/questao/{{ primeira_questao }}"
       hx-trigger="load"
       hx-target="#questao-area"
       hx-swap="innerHTML"
       {% endif %}>

    {% if not primeira_questao %}
      <div class="card">
        <p>Nenhuma questão disponível nesta atividade.</p>
      </div>
    {% else %}
      <div id="loading">Carregando questão…</div>
    {% endif %}
  </div>

</div>

<script>
  document.body.addEventListener("htmx:afterSwap", function () {
    var el = document.querySelector("[data-num]");
    if (!el) return;
    var num   = parseInt(el.dataset.num,   10);
    var total = parseInt(el.dataset.total, 10);
    if (!total) return;
    var pct = Math.round((num - 1) / total * 100);
    document.getElementById("prog-fill").style.width  = pct + "%";
    document.getElementById("prog-label").textContent = (num - 1) + " / " + total;
  });

  (function () {
    var el = document.getElementById("timer");
    if (!el) return;
    var seg = parseInt(el.dataset.seg, 10);
    var ativId = el.dataset.ativ;

    function fmt(s) {
      var m = Math.floor(s / 60);
      var ss = s % 60;
      return m + ":" + (ss < 10 ? "0" : "") + ss;
    }

    el.textContent = fmt(seg);

    var iv = setInterval(function () {
      seg--;
      if (seg <= 0) {
        clearInterval(iv);
        el.textContent = "0:00";
        htmx.ajax("GET", "/htmx/resultado/" + ativId, {target: "#questao-area", swap: "innerHTML"});
        return;
      }
      el.textContent = fmt(seg);
      if (seg <= 60) el.classList.add("urgente");
    }, 1000);
  })();
</script>
</body>
</html>
