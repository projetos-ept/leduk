<div class="card" data-num="{{ num }}" data-total="{{ total }}">
  <p class="enunciado">{{ questao.enunciado }}</p>

  <form hx-post="/htmx/responder"
        hx-target="#questao-area"
        hx-swap="innerHTML">
    <input type="hidden" name="tipo"       value="vf">
    <input type="hidden" name="questao_id" value="{{ questao.id }}">
    <input type="hidden" name="ativ_id"    value="{{ ativ_id }}">

    <div class="itens-vf">
      {% for item in questao.itens_vf %}
        <div class="item-vf">
          <p>{{ loop.index }}. {{ item.afirmacao }}
            {% if item.imagem %}
              <img src="{{ item.imagem }}" alt="imagem item {{ loop.index }}">
            {% endif %}
          </p>
          <div class="vf-botoes">
            <label class="btn-vf v">
              <input type="radio" name="vf_{{ item.ordem }}" value="true" required>
              ✓ Verdadeiro
            </label>
            <label class="btn-vf f">
              <input type="radio" name="vf_{{ item.ordem }}" value="false">
              ✗ Falso
            </label>
          </div>
        </div>
      {% endfor %}
    </div>

    <button class="btn-responder" type="submit">Responder</button>
  </form>
</div>
