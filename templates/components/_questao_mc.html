<div class="card" data-num="{{ num }}" data-total="{{ total }}">
  <p class="enunciado">
    {{ questao.enunciado }}
    {% if questao.imagem %}
      <img src="{{ questao.imagem }}" alt="imagem da questão">
    {% endif %}
  </p>

  <form hx-post="/htmx/responder"
        hx-target="#questao-area"
        hx-swap="innerHTML">
    <input type="hidden" name="tipo"       value="{{ questao.tipo }}">
    <input type="hidden" name="questao_id" value="{{ questao.id }}">
    <input type="hidden" name="ativ_id"    value="{{ ativ_id }}">

    <div class="alternativas">
      {% set _letras = ['A','B','C','D','E'] %}
      {% for alt in questao.alternativas %}
        <label class="alternativa-label">
          <input type="radio" name="resposta" value="{{ alt.letra }}" required>
          <span class="letra-badge">{{ _letras[loop.index0] }}</span>
          <span class="alternativa-texto">
            {{ alt.texto }}
            {% if alt.imagem %}
              <img src="{{ alt.imagem }}" alt="imagem alternativa {{ _letras[loop.index0] }}">
            {% endif %}
          </span>
        </label>
      {% endfor %}
    </div>

    <button class="btn-responder" type="submit">Responder</button>
  </form>
</div>
