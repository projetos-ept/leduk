{% if not questoes %}
  <p style="color:var(--muted);font-size:.85rem;padding:8px 0;">Nenhuma questão encontrada com esses filtros.</p>
{% else %}
  <div class="qb-list">
    {% for q in questoes %}
      <div class="qb-card" style="padding:10px 14px;">
        <div class="qb-card-body">
          <div class="qb-card-meta">
            <span class="quest-tipo-badge quest-tipo-{{ q.tipo }}">{{ q.tipo | upper }}</span>
            {% if q.assunto %}<span class="banco-assunto-badge">{{ q.assunto }}</span>{% endif %}
            <span class="qb-peso-badge">peso {{ q.peso | int if q.peso == q.peso | int else q.peso }}</span>
          </div>
          <p class="qb-card-enunciado">{{ q.enunciado }}</p>
        </div>
        <div class="qb-card-acoes">
          <button type="button" class="btn-primary btn-sm"
                  hx-post="/htmx/provas/{{ prova_id }}/adicionar-questao/{{ q.id }}"
                  hx-target="#questoes-na-prova" hx-swap="outerHTML">+ Adicionar</button>
        </div>
      </div>
    {% endfor %}
  </div>
{% endif %}
