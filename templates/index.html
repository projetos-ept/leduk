<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LeDuk</title>
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
<div class="shell">

  <div class="home-header">
    <h1>LeDuk</h1>
    <p>Selecione uma turma para iniciar as atividades</p>
  </div>

  {% if turmas %}
    <div class="turmas-grid">
      {% for turma in turmas %}
        <a class="turma-card" href="/atividade/{{ turma.id }}">
          <h2>{{ turma.nome }}</h2>
          <span>{{ turma.modalidade }}{% if turma.ano %} · {{ turma.ano }}{% endif %}</span>
        </a>
      {% endfor %}
    </div>
  {% else %}
    <div class="card" style="text-align:center; color: var(--suave);">
      <p>Nenhuma turma cadastrada ainda.</p>
    </div>
  {% endif %}

</div>
</body>
</html>
